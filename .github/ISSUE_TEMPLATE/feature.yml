name: Feature proposal
description: Propose a focused MacContainer improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the workflow and who is affected without prescribing implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Include safe defaults, advanced parameters, and accessibility needs where relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Security, privacy, compatibility, or cleanup impact
    validations:
      required: true
