name: Bug report
description: Report a reproducible, non-security MacContainer problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose vulnerabilities, credentials, or private container data here. Follow SECURITY.md for private security reporting.
  - type: input
    id: app-version
    attributes:
      label: MacContainer version
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include Mac model, macOS version, and Apple container version.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a minimal example and redact secrets and personal data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, tokens, personal data, and private registry details.
          required: true
        - label: This is not a security vulnerability.
          required: true
