name: Apple container upstream monitor

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Record unreviewed upstream releases
    runs-on: macos-26
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out the embedded compatibility contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Create or refresh a draft compatibility issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("node:fs");
            const contractPath = "Sources/MCContracts/Resources/apple-container-1.1.0.json";
            const contract = JSON.parse(fs.readFileSync(contractPath, "utf8"));
            const reviewed = [
              contract.runtimeVersion.major,
              contract.runtimeVersion.minor,
              contract.runtimeVersion.patch,
            ].join(".");
            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: "apple",
              repo: "container",
            });
            const upstream = release.tag_name.replace(/^v/, "");
            core.summary.addHeading("Apple container release monitor");
            core.summary.addTable([
              [{ data: "Reviewed", header: true }, reviewed],
              [{ data: "Latest upstream", header: true }, upstream],
            ]);
            if (upstream === reviewed) {
              core.summary.addRaw("No compatibility review is required.");
              await core.summary.write();
              return;
            }

            const title = `[Draft compatibility] Review Apple container ${release.tag_name}`;
            const assets = release.assets.length === 0
              ? "- No release assets reported"
              : release.assets.map((asset) =>
                  `- ${asset.name}: ${asset.size} bytes, ${asset.browser_download_url}`
                ).join("\n");
            const body = [
              "An Apple container release newer than the embedded reviewed contract was detected.",
              "",
              `- Embedded reviewed version: ${reviewed}`,
              `- Upstream tag: ${release.tag_name}`,
              `- Published: ${release.published_at}`,
              `- Release: ${release.html_url}`,
              "",
              "Release assets:",
              assets,
              "",
              "This issue is an intake record only. Do not enable, install, or mark this version compatible until the full compatibility review and test matrix pass.",
            ].join("\n");
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: "open",
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
            core.summary.addRaw(`Recorded ${release.tag_name} for explicit review.`);
            await core.summary.write();
