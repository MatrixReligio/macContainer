name: Apple container upstream monitor

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Record unverified upstream release metadata
    runs-on: macos-26
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out the metadata inspector
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Fetch metadata and independently hash the installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          metadata="$RUNNER_TEMP/apple-container-release.json"
          package="$RUNNER_TEMP/apple-container-installer.pkg"
          issue="$RUNNER_TEMP/apple-container-candidate.md"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            https://api.github.com/repos/apple/container/releases/latest \
            --output "$metadata"
          asset_url="$(jq -er '.assets[] | select(.name | endswith("installer-signed.pkg")) | .browser_download_url' "$metadata" | head -1)"
          [[ "$asset_url" == https://github.com/apple/container/releases/download/* ]]
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "$asset_url" --output "$package"
          swift scripts/inspect-upstream-release.swift \
            --fixture "$metadata" \
            --asset-file "$package" \
            > "$issue"

      - name: Create or refresh the unverified candidate issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("node:fs");
            const body = fs.readFileSync(`${process.env.RUNNER_TEMP}/apple-container-candidate.md`, "utf8");
            const title = body.split("\n", 1)[0];
            if (!title.startsWith("Compatibility candidate: Apple container ")) {
              core.setFailed("Inspector did not emit the required candidate title");
              return;
            }
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: "open",
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
