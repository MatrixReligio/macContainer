included:
  - App
  - Sources
  - Tests
  - scripts

excluded:
  - .build
  - .tools
  - .worktrees
  - MacContainer.xcodeproj
  - Sources/MCContracts/Resources
  - scripts/generate-contract-snapshot.swift

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - implicit_return
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 900
  error: 1600

function_body_length:
  warning: 100
  error: 180

type_body_length:
  warning: 500
  error: 900

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

reporter: xcode
