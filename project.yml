name: MacContainer
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    ARCHS: arm64
    DEVELOPMENT_TEAM: 4DUQGD879H
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "6"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
packages:
  MacContainerCore:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.4"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.13.0"
targets:
  MacContainer:
    type: application
    platform: macOS
    sources:
      - App/MacContainer
      - path: Config/physical-test-plan-v1.json
        buildPhase: resources
      - path: Config/compatibility/attestations
        buildPhase: resources
    dependencies:
      - package: MacContainerCore
        product: MCModel
      - package: MacContainerCore
        product: MCContracts
      - package: MacContainerCore
        product: MCContainerBridge
      - package: MacContainerCore
        product: MCCompatibility
      - package: MacContainerCore
        product: MCSystemLifecycle
      - package: MacContainerCore
        product: MCAppCore
      - package: MacContainerCore
        product: MCTemplates
      - package: Sparkle
        product: Sparkle
      - package: SwiftTerm
        product: SwiftTerm
      - target: MacContainerPrivilegedHelper
        embed: false
      - target: MacContainerUpdateAgent
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: container.matrixreligio.com
        PRODUCT_NAME: MacContainer
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: App/MacContainer/MacContainer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/MacContainer/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: Copyright 2026 MatrixReligio LLC. Licensed under Apache-2.0.
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - ja
          - ko
        SUFeedURL: https://github.com/matrixreligio/macContainer/releases/latest/download/appcast.xml
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUPublicEDKey: H1VCzTV1DnEB/LGQzJj7/FIDC4HhkwFB9oMIyImL0oY=
    postCompileScripts:
      - name: Embed helper and update agent
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/container.matrixreligio.com.helper
          - $(BUILT_PRODUCTS_DIR)/container.matrixreligio.com.update-agent
          - $(SRCROOT)/App/PrivilegedHelper/container.matrixreligio.com.helper.plist
          - $(SRCROOT)/App/UpdateAgent/container.matrixreligio.com.update-agent.plist
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/MacOS/container.matrixreligio.com.helper
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/MacOS/container.matrixreligio.com.update-agent
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/container.matrixreligio.com.helper.plist
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents/container.matrixreligio.com.update-agent.plist
        script: |
          set -euo pipefail
          executable_dir="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS"
          daemon_dir="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          launch_agent_dir="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchAgents"
          mkdir -p "$executable_dir" "$daemon_dir" "$launch_agent_dir"
          ditto "$BUILT_PRODUCTS_DIR/container.matrixreligio.com.helper" "$executable_dir/container.matrixreligio.com.helper"
          ditto "$BUILT_PRODUCTS_DIR/container.matrixreligio.com.update-agent" "$executable_dir/container.matrixreligio.com.update-agent"
          ditto "$SRCROOT/App/PrivilegedHelper/container.matrixreligio.com.helper.plist" "$daemon_dir/container.matrixreligio.com.helper.plist"
          ditto "$SRCROOT/App/UpdateAgent/container.matrixreligio.com.update-agent.plist" "$launch_agent_dir/container.matrixreligio.com.update-agent.plist"
          if [[ "${CODE_SIGNING_ALLOWED:-YES}" == YES && -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]]; then
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --identifier "container.matrixreligio.com.helper" --options runtime --entitlements "$SRCROOT/App/PrivilegedHelper/PrivilegedHelper.entitlements" "$executable_dir/container.matrixreligio.com.helper"
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --identifier "container.matrixreligio.com.update-agent" --options runtime --entitlements "$SRCROOT/App/UpdateAgent/UpdateAgent.entitlements" "$executable_dir/container.matrixreligio.com.update-agent"
          fi
  MacContainerPrivilegedHelper:
    type: tool
    platform: macOS
    sources:
      - App/PrivilegedHelper
    dependencies:
      - package: MacContainerCore
        product: MCModel
      - package: MacContainerCore
        product: MCSystemLifecycle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: container.matrixreligio.com.helper
        PRODUCT_NAME: container.matrixreligio.com.helper
        CODE_SIGN_ENTITLEMENTS: App/PrivilegedHelper/PrivilegedHelper.entitlements
  MacContainerUpdateAgent:
    type: tool
    platform: macOS
    sources:
      - App/UpdateAgent
    dependencies:
      - package: MacContainerCore
        product: MCModel
      - package: MacContainerCore
        product: MCSystemLifecycle
      - package: MacContainerCore
        product: MCCompatibility
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: container.matrixreligio.com.update-agent
        PRODUCT_NAME: container.matrixreligio.com.update-agent
        CODE_SIGN_ENTITLEMENTS: App/UpdateAgent/UpdateAgent.entitlements
  MacContainerIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/MacContainerIntegrationTests
      - path: App/UpdateAgent/UpdateAgentLocalization.swift
    dependencies:
      - package: MacContainerCore
        product: MCSystemLifecycle
      - package: MacContainerCore
        product: MCCompatibility
      - package: MacContainerCore
        product: MCAppCore
      - package: MacContainerCore
        product: MCModel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  MacContainerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/MacContainerUITests
    dependencies:
      - target: MacContainer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: container.matrixreligio.com.ui-tests
schemes:
  MacContainer:
    build:
      targets:
        MacContainer: all
        MacContainerPrivilegedHelper: all
        MacContainerUpdateAgent: all
    test:
      targets:
        - MacContainerIntegrationTests
        - MacContainerUITests
      environmentVariables:
        MARKETING_SCREENSHOT_DIR: $(MARKETING_SCREENSHOT_DIR)
        SPARKLE_TEST_SEED_APP: $(SPARKLE_TEST_SEED_APP)
        SPARKLE_TEST_FEED_URL: $(SPARKLE_TEST_FEED_URL)
        SPARKLE_TEST_ROOT: $(SPARKLE_TEST_ROOT)
        SPARKLE_TEST_HOME: $(SPARKLE_TEST_HOME)
        SPARKLE_TEST_EXPECTED_VERSION: $(SPARKLE_TEST_EXPECTED_VERSION)
        PHYSICAL_RUN_ID: $(PHYSICAL_RUN_ID)
        PHYSICAL_RUN_ROOT: $(PHYSICAL_RUN_ROOT)
        PHYSICAL_TEST_AUTHORIZATION: $(PHYSICAL_TEST_AUTHORIZATION)
        PHYSICAL_RESULTS_ROOT: $(PHYSICAL_RESULTS_ROOT)
